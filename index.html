<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUPER RUNNER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;font-family:Arial,sans-serif;overflow:hidden;}

#app{position:fixed;top:0;left:0;width:100%;height:100%;background:#050510;overflow:hidden;}

/* SCREENS */
.scr{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;}
.scr.on{display:flex;}

/* LOGIN */
#sLogin{background:radial-gradient(ellipse at center,#ff0000,#ff0000);}
.lbox{background:rgba(255, 0, 0, 0);border:2px solid gold;border-radius:18px;padding:36px 26px;width:min(340px,82vw);text-align:center;box-shadow:0 0 50px rgba(255,215,0,0.2);}
.ltitle{font-family:Impact,Arial,sans-serif;font-size:clamp(46px,12vw,76px);color:gold;text-shadow:0 0 30px gold;letter-spacing:5px;line-height:1;}
.lsub{color:#888;font-size:clamp(10px,2.5vw,13px);letter-spacing:2px;margin:8px 0 26px;}
.gbtn{width:100%;padding:14px;background:linear-gradient(135deg,#000000,#000000);border:none;border-radius:11px;color:#fff;font-family:Impact,Arial,sans-serif;font-size:clamp(18px,4vw,22px);letter-spacing:3px;cursor:pointer;}
.gbtn:active{opacity:.75;}

/* MENU */
#sMenu{background:radial-gradient(ellipse at top,#ff0000,#ff0000);}
.mtitle{font-family:Impact,Arial,sans-serif;font-size:clamp(50px,14vw,95px);color:gold;text-shadow:0 0 40px gold,0 4px 0 #8B6914;letter-spacing:5px;text-align:center;line-height:.9;margin-bottom:8px;}
.mstars{color:gold;font-size:clamp(14px,3.5vw,18px);letter-spacing:5px;margin-bottom:24px;}
.mbtns{display:flex;flex-direction:column;gap:11px;width:min(260px,72vw);}
.mbtn{padding:clamp(12px,3vw,15px);font-family:Impact,Arial,sans-serif;font-size:clamp(16px,4vw,19px);letter-spacing:2px;border:none;border-radius:11px;cursor:pointer;}
.mbtn:active{opacity:.75;}
.bred{background:linear-gradient(135deg,#CC0000,#ff5500);color:#fff;}
.bblu{background:linear-gradient(135deg,#0a1a4a,#1a2a7a);color:#fff;border:1px solid #48f;}
.bgrn{background:linear-gradient(135deg,#0a2a1a,#1a5a2a);color:#0f8;border:1px solid #0f8;}

/* LEVELS */
#sLevels{background:#ff0000;align-items:stretch;justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.lvlwrap{padding:14px;display:flex;flex-direction:column;align-items:center;min-height:100%;}
.ptitle{font-family:Impact,Arial,sans-serif;font-size:clamp(24px,5vw,32px);color:gold;letter-spacing:3px;margin:14px 0;text-align:center;}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:6px;width:min(520px,94vw);margin-bottom:14px;}
.lcel{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:clamp(13px,3vw,15px);cursor:pointer;border:2px solid transparent;}
.lcel:active{transform:scale(.85);}
.lok{background:#1a3a1a;color:#0f8;border-color:#0f8;}
.llk{background:#111;color:#333;border-color:#222;cursor:not-allowed;}
.lcu{background:linear-gradient(135deg,#CC0000,#f30);color:#fff;border-color:gold;}
.bbk{padding:9px 24px;margin-bottom:14px;background:none;border:1px solid #555;border-radius:7px;color:#aaa;font-size:clamp(13px,3vw,15px);cursor:pointer;}

/* HOWTO / LANG */
#sHowto,#sLang{background:#050510;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.ibox{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:22px;width:min(440px,88vw);text-align:center;margin:16px 0;}
.ibox h2{font-family:Impact,Arial,sans-serif;font-size:clamp(22px,5vw,28px);color:gold;letter-spacing:3px;margin-bottom:14px;}
.ibox h3{color:#6af;font-size:clamp(12px,3vw,14px);margin:10px 0 4px;}
.ibox p{color:#bbb;font-size:clamp(11px,2.5vw,13px);line-height:1.8;}
.kk{display:inline-block;background:rgba(0,150,255,.2);border:1px solid #6af;color:#6af;padding:2px 6px;border-radius:4px;font-size:11px;margin:2px;}
.lgbtn{display:block;width:100%;padding:11px;margin-bottom:8px;background:rgba(0,0,0,.5);border:1px solid rgba(0,255,136,.3);border-radius:8px;color:#fff;font-size:clamp(14px,3.5vw,16px);cursor:pointer;}
.lgbtn:active,.lgon{background:rgba(0,255,136,.15)!important;border-color:#0f8!important;color:#0f8!important;}

/* GAME */
#sGame{background:#000;}
#gc{position:absolute;top:0;left:0;display:block;}
#hud{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);pointer-events:none;}
.hlv{display:flex;gap:3px;font-size:clamp(16px,4vw,20px);}
.hll{font-family:Impact,Arial,sans-serif;font-size:clamp(16px,4vw,20px);color:gold;letter-spacing:2px;}
.hls{font-family:Impact,Arial,sans-serif;font-size:clamp(16px,4vw,20px);color:#0f8;}
#ctrl{position:absolute;bottom:0;left:0;right:0;z-index:5;display:none;justify-content:space-between;align-items:flex-end;padding:6px 14px 14px;background:linear-gradient(to top,rgba(0,0,0,.55),transparent);pointer-events:none;}
.cgrp{display:flex;gap:8px;pointer-events:all;}
.cbtn{width:clamp(56px,14vw,70px);height:clamp(56px,14vw,70px);border-radius:50%;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.38);color:#fff;font-size:clamp(20px,5vw,24px);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.cbtn:active{background:rgba(255,255,255,.4);}
.cjmp{background:rgba(200,0,0,.48);border-color:#f44;}
#gover{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;background:rgba(0,0,0,.84);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:16px;}
.ovt{font-family:Impact,Arial,sans-serif;font-size:clamp(32px,8vw,60px);letter-spacing:3px;margin-bottom:7px;}
.ovs{color:#bbb;font-size:clamp(12px,3vw,15px);margin-bottom:18px;}
.ovb{padding:11px 28px;margin:4px;font-family:Impact,Arial,sans-serif;font-size:clamp(15px,3.5vw,18px);letter-spacing:2px;border:none;border-radius:10px;cursor:pointer;}
.ovb:active{opacity:.75;}
.on1{background:linear-gradient(135deg,#00aa44,#00ff88);color:#000;}
.on2{background:linear-gradient(135deg,#CC0000,#f30);color:#fff;}
.on3{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}

/* SCARY */
#sScary{background:#000;cursor:pointer;}
#sc2{position:absolute;top:0;left:0;display:block;}
#scT{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:Impact,Arial,sans-serif;font-size:clamp(26px,6vw,56px);color:#f00;text-shadow:0 0 20px #f00;letter-spacing:3px;text-align:center;white-space:pre-line;z-index:5;animation:sf .4s infinite;}
@keyframes sf{0%,100%{opacity:1}50%{opacity:.3}}

/* STARS */
.star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--d) ease-in-out infinite var(--dl);}
@keyframes tw{0%,100%{opacity:.8}50%{opacity:.05}}
</style>
</head>

    <button class="bbk" onclick="showScr('sMenu')">← BACK</button>
  </div>
</div>

<!-- GAME -->
<div class="scr" id="sGame">
  <canvas id="gc"></canvas>
  <div id="hud">
    <div class="hlv" id="hudLives"></div>
    <div class="hll" id="hudLvl">1</div>

  </div>
  <div id="ctrl">
    <div class="cgrp">
      <div class="cbtn" id="cL">◀</div>
      <div class="cbtn" id="cR">▶</div>
    </div>
    <div class="cgrp">
      <div class="cbtn cjmp" id="cJ">⬆</div>
    </div>
  </div>
  <div id="gover">
    <div class="ovt" id="ovT" style="color:gold;"></div>
    <div class="ovs" id="ovS"></div>
    <button class="ovb on1" id="ovNext" onclick="nextLvl()">NEXT ▶</button>
    <button class="ovb on2" id="ovRetry" onclick="retryLvl()">RETRY ↺</button>
    <button class="ovb on3" id="ovMenu" onclick="showScr('sMenu')">MENU ⌂</button>
  </div>
</div>

<!-- SCARY -->
<div class="scr" id="sScary" onclick="showScr('sMenu')">
  <canvas id="sc2"></canvas>
  <div id="scT">YOU WON!<br>💀 SIUUUU 💀</div>
</div>

</div>
<script>
'use strict';

const TR={
  ar:{lsub:'سيووو! 🔥',lbtn:'▶ دخول',mplay:'▶ العب',mhow:'? كيف تلعب',mlang:'🌐 اللغة',lvlt:'اختر المرحلة',back:'← رجوع',htt:'كيف تلعب',htpc:'🖥️ PC',htpct:'← → تحرك │ ↑ Space قفز │ ESC وقفة',htmb:'📱 جوال',htmbt:'استخدم الأزرار على الشاشة',htrls:'📋 القواعد',htrlst:'اجمع ⚽ • اسحق 🔴 • علم 🏁 • 3 أرواح • 100 مرحلة',hudlvl:'مرحلة',win:'🎉 تم المرور!',lose:'💀 انتهت اللعبة',losesub:'تبي تحاول مرة ثانية؟',next:'التالي ▶',retry:'أعد ↺',menu:'القائمة ⌂',sct:'انتصرت!\n💀 سيووو 💀',pause:'⏸ وقفة'},
  en:{lsub:'SIUUUU! 🔥',lbtn:'▶ ENTER',mplay:'▶ PLAY',mhow:'? HOW TO PLAY',mlang:'🌐 LANGUAGE',lvlt:'SELECT LEVEL',back:'← BACK',htt:'HOW TO PLAY',htpc:'🖥️ PC',htpct:'← → Move │ ↑ Space Jump │ ESC Pause',htmb:'📱 Mobile',htmbt:'Use on-screen buttons',htrls:'📋 Rules',htrlst:'Collect ⚽ • Stomp 🔴 • Flag 🏁 • 3 lives • 100 levels',hudlvl:'LVL',win:'🎉 LEVEL CLEAR!',lose:'💀 GAME OVER',losesub:'Try again?',next:'NEXT ▶',retry:'RETRY ↺',menu:'MENU ⌂',sct:'YOU WON!\n💀 SIUUUU 💀',pause:'⏸ PAUSED'},

};
let lang='ar',T=TR.ar;

function applyT(){
  const m={t_lsub:'lsub',t_lbtn:'lbtn',t_mplay:'mplay',t_mhow:'mhow',t_mlang:'mlang',t_lvlt:'lvlt',t_back1:'back',t_back2:'back',t_htt:'htt',t_htpc:'htpc',t_htpct:'htpct',t_htmb:'htmb',t_htmbt:'htmbt',t_htrls:'htrls',t_htrlst:'htrlst',ovNext:'next',ovRetry:'retry',ovMenu:'menu'};
  for(const[id,k]of Object.entries(m)){const e=document.getElementById(id);if(e)e.textContent=T[k];}
}
applyT();

function setLang(l){
  lang=l;T=TR[l];
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  applyT();
  document.querySelectorAll('.lgbtn').forEach(b=>b.classList.remove('lgon'));
  const m={ar:'bAr',en:'bEn',fr:'bFr',es:'bEs',pt:'bPt',id:'bId'};
  const el=document.getElementById(m[l]);if(el)el.classList.add('lgon');
  showScr('sMenu');
}

// STARS
(function(){
  const bg=document.getElementById('starsBg');let h='';
  for(let i=0;i<60;i++){const x=Math.random()*100,y=Math.random()*100,s=Math.random()*2+.5,o=Math.random()*.6+.2,d=(Math.random()*4+2).toFixed(1),dl=(Math.random()*4).toFixed(1);h+=`<div class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;opacity:${o};--d:${d}s;--dl:${dl}s;"></div>`;}
  bg.innerHTML=h;
})();

// SCREEN MANAGER
let curScr='sLogin';
function showScr(id){
  stopGame();
  const old=document.getElementById(curScr);
  old.classList.remove('on');
  old.style.display='';
  const nw=document.getElementById(id);
  nw.style.display='flex';
  nw.classList.add('on');
  curScr=id;
}

// AUDIO
let AC=null;
function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();return AC;}
function boop(f,t,d,v=0.2,f2){try{const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;if(f2)o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+d);g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}
function sfxJ(){boop(300,'sine',.18,.18,700);}
function sfxC(){boop(880,'square',.08,.18);setTimeout(()=>boop(1320,'square',.15,.18),80);}
function sfxD(){boop(400,'sawtooth',.12,.22,100);setTimeout(()=>boop(280,'sawtooth',.12,.18,60),140);setTimeout(()=>boop(160,'sawtooth',.15,.18,40),280);}
function sfxW(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>boop(f,'square',.22,.18),i*150));}
function sfxGO(){[392,330,262,196].forEach((f,i)=>setTimeout(()=>boop(f,'sawtooth',.28,.2),i*200));}
function sfxSt(){boop(800,'square',.15,.22);}
function sfxSc(){boop(60,'sawtooth',3,.4,20);setTimeout(()=>boop(2000,'sawtooth',1.5,.28,80),100);}
let bgT=null;
function bgPlay(l){clearTimeout(bgT);const a=ac();if(!a)return;const sp=Math.max(.06,.16-l*.001),bs=120+(l%10)*12,ns=[bs,bs*1.25,bs*1.5,bs*2,bs*1.5,bs*1.25];let i=0;function t(){if(!gOn)return;try{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='square';o.frequency.value=ns[i%ns.length];g.gain.setValueAtTime(.05,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+sp*.9);o.start();o.stop(a.currentTime+sp*.9);}catch(e){}i++;bgT=setTimeout(t,sp*1000);}t();}
function bgStop(){clearTimeout(bgT);bgT=null;}

// LOGIN
function doLogin(){ac();sfxW();showScr('sMenu');}

// LEVELS
let unlocked=parseInt(localStorage.getItem('cr7u')||'1');
let curLvl=1,lives=3,score=0;
function buildGrid(){
  const g=document.getElementById('lgrid');g.innerHTML='';
  for(let i=1;i<=100;i++){
    const d=document.createElement('div');d.textContent=i;
    if(i<unlocked){d.className='lcel lok';d.onclick=()=>startLvl(i);}
    else if(i===unlocked){d.className='lcel lcu';d.onclick=()=>startLvl(i);}
    else d.className='lcel llk';
    g.appendChild(d);
  }
}

// GAME
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let W=0,H=0,gOn=false,paused=false,rafID=null;
const keys={L:false,R:false};
let plats=[],enems=[],coins=[],parts=[],flagX=0,flagY=0,camX=0,lvlDone=false;
const P={x:0,y:0,w:32,h:42,vx:0,vy:0,gnd:false,rt:true,fr:0,ft:0,inv:0,dead:false};

function rsz(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
}

function pc(l){return['#1a4a1a','#2a3a1a','#1a2a4a','#3a1a1a','#2a1a3a','#4a3a0a'][Math.floor((l-1)/17)%6];}
function sky(l){return[['#0a1828','#152840'],['#180820','#300a40'],['#1a0808','#400808'],['#081a0a','#103018'],['#0d0d0d','#1a1a1a'],['#180828','#300850'],['#080e28','#081848'],['#130008','#280018'],['#030305','#080808'],['#000','#000']][Math.min(Math.floor((l-1)/10),9)];}

function genLvl(l){
  plats=[];enems=[];coins=[];parts=[];lvlDone=false;
  const df=(l-1)/99,lw=3000+l*90,gh=H-80,T=40,gp=.1+df*.38;
  let x=0;
  while(x<lw){const pw=T*(4+Math.floor(Math.random()*6));plats.push({x,y:gh,w:pw,h:80,c:pc(l)});x+=pw+(Math.random()<gp?T*(1+Math.floor(Math.random()*3)):0);}
  plats.push({x:lw-200,y:gh,w:400,h:80,c:pc(l)});
  for(let i=0;i<8+l*2;i++)plats.push({x:300+Math.random()*(lw-600),y:gh-T*(2+Math.floor(Math.random()*5)),w:T*(2+Math.floor(Math.random()*4)),h:16,c:pc(l),f:1});
  for(let i=0;i<12+l*2;i++)coins.push({x:200+Math.random()*(lw-400),y:gh-T*(1+Math.floor(Math.random()*5)),r:10,got:false,b:Math.random()*6.28});
  for(let i=0;i<Math.floor(2+l*.3);i++){const ex=400+Math.random()*(lw-800);enems.push({x:ex,y:gh-34,w:28,h:34,vx:(.8+df*1.8)*(Math.random()>.5?1:-1),sx:ex,rng:100+Math.random()*200,dead:false});}
  flagX=lw-130;flagY=gh-120;camX=0;
}

function spP(x,y,col,n=8){for(let i=0;i<n;i++){const a=Math.PI*2*i/n+Math.random()*.5,sp=2+Math.random()*4;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,col,r:3+Math.random()*3});}}

function update(){
  if(P.dead){P.inv--;if(P.inv<=0){lives--;updHUD();if(lives<=0)endGame();else respawn();}return;}
  const sp=3.5+curLvl*.025;
  if(keys.L){P.vx=-sp;P.rt=false;}else if(keys.R){P.vx=sp;P.rt=true;}else P.vx*=.65;
  P.vy+=.55;if(P.vy>18)P.vy=18;
  P.x+=P.vx;P.y+=P.vy;
  P.gnd=false;
  for(const p of plats){if(P.x+P.w>p.x&&P.x<p.x+p.w&&P.y+P.h>p.y&&P.y+P.h<p.y+p.h+14&&P.vy>=0){P.y=p.y-P.h;P.vy=0;P.gnd=true;}}
  if(P.y>H+150){die();return;}
  if(P.x-camX<10)P.x=camX+10;
  for(const c of coins){if(!c.got){c.b+=.07;if(Math.hypot(P.x+P.w/2-c.x,P.y+P.h/2-c.y)<c.r+16){c.got=true;score+=10+curLvl;sfxC();spP(c.x,c.y,'#FFD700',6);document.getElementById('hudSc').textContent=score;}}}
  for(const e of enems){if(e.dead)continue;e.x+=e.vx;if(Math.abs(e.x-e.sx)>e.rng)e.vx*=-1;const ox=P.x+P.w>e.x+4&&P.x<e.x+e.w-4,oy=P.y+P.h>e.y&&P.y<e.y+e.h;if(ox&&oy){if(P.vy>0&&P.y+P.h<e.y+20){e.dead=true;P.vy=-10;score+=50+curLvl*2;sfxSt();spP(e.x+e.w/2,e.y,'#f44',10);document.getElementById('hudSc').textContent=score;}else if(P.inv<=0){die();return;}}}
  if(!lvlDone&&Math.abs(P.x+P.w/2-(flagX+20))<44&&P.y<flagY+90){lvlDone=true;score+=200+curLvl*10;document.getElementById('hudSc').textContent=score;sfxW();bgStop();if(unlocked<=curLvl){unlocked=curLvl+1;localStorage.setItem('cr7u',unlocked);}setTimeout(()=>showOv('win'),600);}
  camX+=(P.x-W*.35-camX)*.12;if(camX<0)camX=0;
  P.ft++;if(P.ft>8){P.fr=(P.fr+1)%4;P.ft=0;}if(P.inv>0)P.inv--;
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life*=.92;}
  parts=parts.filter(p=>p.life>.03);
}

function die(){if(P.inv>0)return;P.dead=true;P.inv=70;P.vy=-14;sfxD();spP(P.x+P.w/2,P.y+P.h/2,'#FFD700',12);}
function respawn(){P.x=100;P.y=H-200;P.vx=0;P.vy=0;P.dead=false;P.inv=110;}
function endGame(){gOn=false;bgStop();sfxGO();showOv('gameover');}

function draw(){
  const sk=sky(curLvl);const gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,sk[0]);gr.addColorStop(1,sk[1]);ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  if(curLvl>40){ctx.fillStyle='rgba(255,255,255,.5)';const sd=curLvl*137;for(let i=0;i<30;i++)ctx.fillRect((sd*(i+1)*7919)%W,(sd*(i+1)*6271)%(H*.55),1.5,1.5);}
  ctx.save();ctx.translate(-Math.floor(camX),0);
  for(const p of plats){if(p.x+p.w<camX-20||p.x>camX+W+20)continue;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.w,p.h);if(!p.f){ctx.fillStyle='#2a7a2a';ctx.fillRect(p.x,p.y,p.w,7);}ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(p.x,p.y,p.w,3);}
  for(const c of coins){if(c.got||c.x<camX-40||c.x>camX+W+40)continue;const by=Math.sin(c.b)*4;ctx.shadowBlur=10;ctx.shadowColor='gold';ctx.beginPath();ctx.arc(c.x,c.y+by,c.r,0,Math.PI*2);ctx.fillStyle='gold';ctx.fill();ctx.strokeStyle='#cc8800';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(c.x-5,c.y+by);ctx.lineTo(c.x+5,c.y+by);ctx.stroke();ctx.beginPath();ctx.moveTo(c.x,c.y-5+by);ctx.lineTo(c.x,c.y+5+by);ctx.stroke();}
  for(const e of enems){if(e.dead||e.x+e.w<camX-20||e.x>camX+W+20)continue;ctx.save();ctx.translate(e.x+e.w/2,e.y);ctx.fillStyle='#CC0000';ctx.beginPath();ctx.ellipse(0,e.h/2,e.w/2,e.h/2,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.fillRect(-9,9,7,7);ctx.fillRect(3,9,7,7);ctx.fillStyle='#000';ctx.fillRect(-7,11,3,3);ctx.fillRect(5,11,3,3);ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-12,7);ctx.lineTo(-3,10);ctx.stroke();ctx.beginPath();ctx.moveTo(12,7);ctx.lineTo(3,10);ctx.stroke();ctx.fillStyle='#880000';ctx.fillRect(-9,e.h-4,9,5);ctx.fillRect(1,e.h-4,9,5);ctx.restore();}
  ctx.fillStyle='#888';ctx.fillRect(flagX,flagY,6,80);ctx.fillStyle=curLvl===100?'#f00':'#0c0';ctx.fillRect(flagX+6,flagY,30,22);ctx.fillStyle='#fff';ctx.font='14px Arial';ctx.fillText(curLvl===100?'👑':'🏁',flagX+7,flagY+17);
  if(!P.dead||Math.floor(P.inv/5)%2===0){
    const x=P.x,y=P.y,w=P.w,h=P.h,d=P.rt?1:-1;
    ctx.save();ctx.translate(x+w/2,y);
    ctx.fillStyle='#CC0000';ctx.fillRect(-w/2+2,h*.28,w-4,h*.44);
    ctx.fillStyle='rgba(255,255,255,.28)';ctx.fillRect(-3,h*.3,7,h*.2);
    ctx.fillStyle='#111';ctx.fillRect(-w/2+3,h*.7,w-6,h*.17);
    const lg=P.gnd?Math.sin(P.fr*1.6)*5:0;
    ctx.fillStyle='#ffcc99';ctx.fillRect(-w/2+4,h*.86,10,h*.14);ctx.fillRect(w/2-14,h*.86+lg,10,h*.14);
    ctx.fillStyle='#111';ctx.fillRect(-w/2+2,h,14,5);ctx.fillRect(w/2-16,h-2+lg,15,5);
    const as=P.gnd?Math.sin(P.fr*1.6)*7:0;
    ctx.fillStyle='#ffcc99';ctx.fillRect(-w/2-5,h*.3+as,8,18);ctx.fillRect(w/2-3,h*.3-as,8,18);
    ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.ellipse(0,h*.14,w/2-3,h*.19,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1000';ctx.fillRect(-w/2+4,-2,w-8,h*.1);
    ctx.fillStyle='#000';ctx.fillRect(d*2-3,h*.1,3,3);
    ctx.fillStyle='gold';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.fillText('7',0,h*.58);
    ctx.strokeStyle='#8B4513';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(d,h*.21,4,.3,Math.PI-.3);ctx.stroke();
    ctx.restore();
  }
  for(const p of parts){ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.restore();
}

function updHUD(){
  let h='';for(let i=0;i<3;i++)h+=`<span style="${i<lives?'':'filter:grayscale(1) opacity(.2)'}">❤️</span>`;
  document.getElementById('hudLives').innerHTML=h;
  document.getElementById('hudLvl').textContent=T.hudlvl+' '+curLvl;
}

function gameLoop(){if(!gOn)return;if(!paused){update();draw();}rafID=requestAnimationFrame(gameLoop);}
function stopGame(){gOn=false;bgStop();cancelAnimationFrame(rafID);document.getElementById('gover').style.display='none';}

function startLvl(l){
  curLvl=l;rsz();genLvl(l);respawn();P.inv=0;updHUD();
  document.getElementById('hudSc').textContent=score;
  document.getElementById('gover').style.display='none';
  const mob=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||('ontouchstart' in window)||(navigator.maxTouchPoints>0);
  document.getElementById('ctrl').style.display=mob?'flex':'none';
  showScr('sGame');gOn=true;paused=false;
  bgStop();bgPlay(l);cancelAnimationFrame(rafID);gameLoop();
}

function showOv(type){
  const ov=document.getElementById('gover');ov.style.display='flex';
  const ot=document.getElementById('ovT'),os=document.getElementById('ovS');
  if(type==='win'){ot.textContent=T.win;ot.style.color='gold';os.textContent=T.hudlvl+' '+curLvl+' | Score: '+score;document.getElementById('ovNext').style.display=curLvl>=100?'none':'inline-block';document.getElementById('ovRetry').style.display='none';}
  else if(type==='gameover'){ot.textContent=T.lose;ot.style.color='#f33';os.textContent=T.losesub;document.getElementById('ovNext').style.display='none';document.getElementById('ovRetry').style.display='inline-block';}
  else{ot.textContent=T.pause;ot.style.color='#6af';os.textContent='';document.getElementById('ovNext').style.display='none';document.getElementById('ovRetry').style.display='none';}
}
function nextLvl(){document.getElementById('gover').style.display='none';if(curLvl>=100){showScary();return;}startLvl(curLvl+1);}
function retryLvl(){lives=3;score=0;document.getElementById('gover').style.display='none';startLvl(curLvl);}

function showScary(){
  const sc=document.getElementById('sc2');sc.width=W;sc.height=H;sc.style.width=W+'px';sc.style.height=H+'px';
  const s=sc.getContext('2d'),cx=W/2,cy=H/2,r=Math.min(W,H)*.42;
  s.fillStyle='#000';s.fillRect(0,0,W,H);
  const g=s.createRadialGradient(cx,cy,0,cx,cy,r*1.3);g.addColorStop(0,'rgba(160,0,0,.9)');g.addColorStop(1,'rgba(0,0,0,0)');s.fillStyle=g;s.fillRect(0,0,W,H);
  s.fillStyle='#180a0a';s.beginPath();s.ellipse(cx,cy,r*.85,r,0,0,Math.PI*2);s.fill();s.strokeStyle='#dd0000';s.lineWidth=3;s.stroke();
  s.strokeStyle='rgba(255,0,0,.35)';s.lineWidth=1;for(let i=0;i<18;i++){s.beginPath();let lx=cx+(Math.random()-.5)*r*1.5,ly=cy+(Math.random()-.5)*r*1.5;s.moveTo(lx,ly);for(let j=0;j<4;j++){lx+=(Math.random()-.5)*70;ly+=(Math.random()-.5)*70;s.lineTo(lx,ly);}s.stroke();}
  [-0.3,0.3].forEach(dx=>{const ex=cx+dx*r,ey=cy-r*.15;s.fillStyle='#180000';s.beginPath();s.ellipse(ex,ey,r*.18,r*.13,0,0,Math.PI*2);s.fill();s.fillStyle='#000';s.beginPath();s.ellipse(ex,ey,r*.11,r*.14,0,0,Math.PI*2);s.fill();s.fillStyle='#ff0000';s.beginPath();s.ellipse(ex,ey,r*.06,r*.08,0,0,Math.PI*2);s.fill();s.fillStyle='rgba(255,255,255,.9)';s.beginPath();s.ellipse(ex-r*.03,ey-r*.04,r*.02,r*.025,0,0,Math.PI*2);s.fill();s.strokeStyle='rgba(255,0,0,.55)';s.lineWidth=.8;for(let v=0;v<6;v++){const va=v/6*Math.PI*2;s.beginPath();s.moveTo(ex+Math.cos(va)*r*.07,ey+Math.sin(va)*r*.07);s.lineTo(ex+Math.cos(va)*r*.17,ey+Math.sin(va)*r*.12);s.stroke();}});
  s.strokeStyle='#ff2200';s.lineWidth=2.5;s.beginPath();s.moveTo(cx-15,cy);s.quadraticCurveTo(cx-35,cy+r*.18,cx-15,cy+r*.26);s.stroke();s.beginPath();s.moveTo(cx+15,cy);s.quadraticCurveTo(cx+35,cy+r*.18,cx+15,cy+r*.26);s.stroke();
  const mw=r*.85,mx=cx-mw/2,my=cy+r*.38;s.fillStyle='#080000';s.beginPath();s.moveTo(mx,my);for(let t=0;t<9;t++){const top=t%2===0?my-r*.08:my+r*.08;s.lineTo(mx+t*(mw/9)+mw/9*.1,top);s.lineTo(mx+(t+1)*(mw/9)-mw/9*.1,top);}s.lineTo(mx+mw,my);s.closePath();s.fill();s.fillStyle='#f5e8cc';for(let t=0;t<8;t+=2)s.fillRect(mx+(t+.1)*(mw/9),my-r*.08,mw/9*.8,r*.08);s.fillStyle='#cc0000';for(let d=0;d<4;d++)s.fillRect(mx+d*(mw/4)+mw/8-2,my,5,10+Math.random()*20);
  document.getElementById('scT').textContent=T.sct;
  showScr('sScary');sfxSc();
}

document.addEventListener('keydown',e=>{
  if(['ArrowLeft','a','A'].includes(e.key))keys.L=true;
  if(['ArrowRight','d','D'].includes(e.key))keys.R=true;
  if(['ArrowUp','w','W',' '].includes(e.key)){e.preventDefault();jump();}
  if(e.key==='Escape')togglePause();
});
document.addEventListener('keyup',e=>{
  if(['ArrowLeft','a','A'].includes(e.key))keys.L=false;
  if(['ArrowRight','d','D'].includes(e.key))keys.R=false;
});
function jump(){if(!gOn||paused||P.dead)return;if(P.gnd){P.vy=-(9+curLvl*.05);if(P.vy<-14)P.vy=-14;sfxJ();}}
function togglePause(){if(!gOn)return;paused=!paused;if(paused){showOv('pause');bgStop();}else{document.getElementById('gover').style.display='none';bgPlay(curLvl);}}

function addT(id,dn,up){
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();if(dn)dn();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();if(up)up();},{passive:false});
  el.addEventListener('mousedown',e=>{e.preventDefault();if(dn)dn();});
  el.addEventListener('mouseup',e=>{e.preventDefault();if(up)up();});
}
addT('cL',()=>keys.L=true,()=>keys.L=false);
addT('cR',()=>keys.R=true,()=>keys.R=false);
addT('cJ',jump,null);

window.addEventListener('resize',()=>{if(gOn)rsz();});
</script>
